# POLICE peer configuration — this agent's private setup, fully separate from the
# thief peer (like two students on two different PCs). Game terms (board, smell,
# rules, positions) MUST match the opponent's config: the pre-game signature
# exchange verifies them and refuses to play on any mismatch.
version = "1.10"

[game]
group_name = "Segal-Police-Team"          # MY group name (shown in title bar, sealed into the log)
sub_game_number = 1             # which sub-game of the series this run is
# Group identity (private-local; exchanged with the opponent in the pre-game handshake
# so each peer can build the whole-match declaration). Roles switch across sub-games,
# so identity is per-GROUP, not per-role.
group_id = "segal-police-team"
members = ["id-1001", "id-1002", "id-1003"]
repos = { cop = "https://github.com/rmisegal/Game-P2P-Cop-Chase", thief = "https://github.com/rmisegal/Game-P2P-Cop-Chase" }
mcp_servers = { cop = "http://127.0.0.1:8802/mcp", thief = "http://127.0.0.1:8802/mcp" }

[board]
size = 7                        # game grid N x N -- must match opponent (signed term)

[smell]
grid_size = 5                   # smell grid M x M -- must match opponent (signed term)
decay_per_step = 0.10
min_center_intensity = 0.5
emit_intensity = 0.9

[rules]
max_steps = 50                  # thief survives this many steps -> thief wins
barriers_max = 20

[positions]
thief_start = [3, 3]
cop_start = [5, 3]                # (7,5) is off-board on 7x7

[belief]
smell_trust_weight = 4.0        # my private tuning (not a signed term)

# [strategy]  --  THE STUDENT'S SEAM (optional; unset => shipped heuristic brain).
# Point either key at YOUR own brain subclass as "package.module:ClassName". Your
# class must subclass police_thief.domain.brains.BrainBase (usually ThiefBrain /
# PoliceBrain) and override `_pick_move(...)` and/or `prompt_builder`. Leaving this
# commented out keeps the default deterministic heuristic. See docs/STRATEGY.md.
# [strategy]
# thief_class  = "my_team.strategy:MyThiefBrain"
# police_class = "my_team.strategy:MyPoliceBrain"

[gui]
cell_px = 52

[paths]
logs_dir = "logs"
log_filename = "{role}_match.json"

[play]
step_speed_seconds = 1.0        # MY GUI pacing (each peer has its own)
setting = "New York"            # signed term
seed = 1234

[network]
my_port = 8802                            # MY MCP server port
opponent_url = "http://127.0.0.1:8801/mcp"  # the ONLY thing I know about the opponent
turn_timeout_seconds = 180
poll_interval_seconds = 0.5
connect_timeout_seconds = 60
retry_interval_seconds = 1.0
audit_send_timeout_seconds = 10

[llm]
provider = "claude"
executable = "claude"
model = "claude-opus-4-8[1m]"   # MY model choice - the opponent may use a different one
args = ["-p", "--output-format", "json"]
timeout_seconds = 120
response_field = "result"
step_deadline_seconds = 30      # HARD cap on LLM thinking per step; miss -> random legal move
short_prompt_threshold_seconds = 10  # deadline below this -> compact prompt (faster reply)

[email]
recipient = "rmisegal+uoh26finalgame@gmail.com"
mode = "draft"
enabled = false
timeout_seconds = 120
draft_script = 'C:\Users\gal-t\.claude\skills\gg\email\draft\scripts\draft.py'
skill_lib = 'C:\Users\gal-t\.claude\skills\gg\email\_lib'
